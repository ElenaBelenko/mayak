<title>Маяк Любви</title>

<style>
:root {
  --rose: #D4A0B0;
  --rose-dark: #BE8A9A;
  --rose-light: #EED0D8;
  --rose-lighter: #F8E8EC;
  --bg: #fdf8f6;
  --card: #ffffff;
  --border: #ecdde2;
  --text: #3a2a30;
  --muted: #8a6e76;
  --radius: 16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Raleway',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6}

header{background:linear-gradient(135deg,var(--rose-lighter),var(--rose-light));padding:1.5rem;text-align:center}
.logo-svg{max-width:320px;width:100%;height:auto;margin:0 auto;display:block}
.stats-bar{background:rgba(212,160,176,.15);color:var(--text);font-size:13px;font-weight:600;padding:10px;border-radius:20px;margin-top:1rem;display:flex;justify-content:center;gap:2rem;flex-wrap:wrap}
.stats-bar strong{color:var(--rose-dark)}

.city-bar{background:var(--card);border-bottom:1px solid var(--border);padding:1rem;text-align:center}
.city-select{padding:8px 16px;border:2px solid var(--border);border-radius:20px;font-family:'Raleway',sans-serif;font-size:14px;font-weight:600;color:var(--text);background:var(--bg);cursor:pointer}
.city-online{font-size:13px;color:var(--muted);margin-left:1rem}

.page{max-width:900px;margin:0 auto;padding:2rem 1.5rem}
.section-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;margin-bottom:.5rem;color:var(--text);text-align:center}
.section-subtitle{font-size:16px;color:var(--muted);text-align:center;margin-bottom:2rem;font-style:italic}

.ideas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;margin-bottom:3rem}
.idea-card{
  background:var(--card);
  border:2px solid var(--border);
  border-radius:var(--radius);
  padding:1.5rem;
  display:flex;
  align-items:flex-start;
  gap:1rem;
  transition:all .25s;
  cursor:pointer;
  position:relative;
}
.idea-card:hover{
  border-color:var(--rose);
  box-shadow:0 4px 24px rgba(212,160,176,.2);
  transform:translateY(-4px);
}
.idea-ico{font-size:36px;line-height:1}
.idea-content{flex:1}
.idea-text{font-size:16px;font-weight:700;color:var(--text);margin-bottom:.35rem}
.idea-sub{font-size:14px;color:var(--muted);margin-bottom:.5rem}
.idea-participants{font-size:12px;color:var(--rose-dark);font-weight:600}
.chat-indicator{
  position:absolute;
  top:1rem;right:1rem;
  background:var(--rose-light);
  width:36px;height:36px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
}

.suggest-card{background:var(--card);border:2px dashed var(--rose-light);border-radius:var(--radius);padding:2rem;margin-bottom:2rem}
.suggest-card h3{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;color:var(--rose-dark);margin-bottom:1.5rem;text-align:center;font-style:italic}
.form-row{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1rem}
.form-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:200px}
.form-group label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.form-group input,.form-group textarea,.form-group select{padding:12px;border:2px solid var(--border);border-radius:12px;font-family:'Raleway',sans-serif;font-size:14px;color:var(--text);background:var(--bg);outline:none}
.form-group input:focus,.form-group textarea:focus{border-color:var(--rose)}
.form-group textarea{resize:vertical;min-height:100px}
.submit-btn{width:100%;padding:14px;background:var(--rose);color:#fff;border:none;border-radius:12px;font-family:'Raleway',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
.submit-btn:hover{background:var(--rose-dark)}

.profile-btn{position:fixed;bottom:2rem;right:2rem;width:64px;height:64px;background:var(--rose);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 4px 20px rgba(212,160,176,.5);cursor:pointer;z-index:100;border:none}
.reset-btn{position:fixed;bottom:2rem;left:2rem;padding:12px 20px;background:var(--rose-dark);color:#fff;border:none;border-radius:12px;font-family:'Raleway',sans-serif;font-size:13px;font-weight:600;cursor:pointer;z-index:100}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:24px;max-width:500px;width:100%;padding:2rem;position:relative;max-height:90vh;overflow-y:auto}
.modal-close{position:absolute;top:1rem;right:1rem;background:var(--rose-lighter);border:none;border-radius:50%;width:40px;height:40px;font-size:22px;cursor:pointer;color:var(--rose-dark);font-weight:800}
.modal h2{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:.75rem;text-align:center}
.modal-sub{font-size:14px;color:var(--muted);margin-bottom:1.5rem;text-align:center}

.profile-header{text-align:center;margin-bottom:1.5rem}
.profile-photo-wrap{position:relative;width:120px;height:120px;margin:0 auto 1rem}
.profile-photo{width:120px;height:120px;border-radius:50%;object-fit:cover;border:4px solid var(--rose-light);background:var(--rose)}
.photo-upload-label{position:absolute;bottom:0;right:0;background:var(--rose);color:#fff;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;border:3px solid #fff}
.photo-upload-input{display:none}

.chat-messages{height:300px;overflow-y:auto;padding:1rem;background:var(--bg);border-radius:12px;border:2px solid var(--border);display:flex;flex-direction:column;gap:1rem;margin-bottom:1rem}
.msg{display:flex;gap:1rem;align-items:flex-start}
.msg.me{flex-direction:row-reverse}
.msg-av{width:40px;height:40px;border-radius:50%;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;background:var(--rose)}
.msg-bubble{background:#fff;border:2px solid var(--border);border-radius:16px;padding:.75rem 1rem;font-size:14px;max-width:75%}
.msg.me .msg-bubble{background:var(--rose);color:#fff;border-color:var(--rose)}
.msg-name{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:.25rem}
.msg.me .msg-name{text-align:right}
.chat-input-row{display:flex;gap:1rem}
.chat-input{flex:1;padding:12px;border:2px solid var(--border);border-radius:12px;font-family:'Raleway',sans-serif;font-size:14px;outline:none}
.chat-send{padding:12px 24px;background:var(--rose);color:#fff;border:none;border-radius:12px;font-family:'Raleway',sans-serif;font-size:14px;font-weight:700;cursor:pointer}

.toast{position:fixed;bottom:2rem;right:2rem;background:var(--text);color:#fff;padding:1rem 1.5rem;border-radius:12px;font-size:14px;font-weight:700;z-index:2000;transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:#4caf50}
</style>

<script>
// БАЗОВЫЕ 14 ИДЕЙ - ВСЕГДА ПОКАЗЫВАЮТСЯ
const BASE_IDEAS = [
  {id:1, emoji:'', title:'Рыбалка на рассвете', sub:'Тишина и чай у воды', cat:'природа', participants:0, chat:[]},
  {id:2, emoji:'🚴', title:'Велопрогулка', sub:'По набережной 10 км', cat:'спорт', participants:0, chat:[]},
  {id:3, emoji:'🏛️', title:'Экскурсия по храмам', sub:'Загородная поездка', cat:'культура', participants:0, chat:[]},
  {id:4, emoji:'🍳', title:'Кулинарный мастер-класс', sub:'Готовим итальянскую пасту', cat:'творчество', participants:0, chat:[]},
  {id:5, emoji:'🌿', title:'Эко-субботник', sub:'Уборка парка + чай', cat:'волонтёрство', participants:0, chat:[]},
  {id:6, emoji:'🐕', title:'Помощь приюту', sub:'Выгул собак', cat:'волонтёрство', participants:0, chat:[]},
  {id:7, emoji:'', title:'Фотопрогулка', sub:'Красивые кадры города', cat:'творчество', participants:0, chat:[]},
  {id:8, emoji:'🎳', title:'Боулинг', sub:'Весело в компании', cat:'спорт', participants:0, chat:[]},
  {id:9, emoji:'🎲', title:'Настольные игры', sub:'В уютном антикафе', cat:'творчество', participants:0, chat:[]},
  {id:10, emoji:'☕', title:'Вечерние посиделки', sub:'Уютное кафе, живая музыка', cat:'еда', participants:0, chat:[]},
  {id:11, emoji:'🎤', title:'Караоке', sub:'Пой и знакомься', cat:'творчество', participants:0, chat:[]},
  {id:12, emoji:'🍕', title:'Пицца-пати', sub:'Готовим и едим вместе', cat:'еда', participants:0, chat:[]},
  {id:13, emoji:'', title:'Бассейн', sub:'Плаваем и общаемся', cat:'спорт', participants:0, chat:[]},
  {id:14, emoji:'🌲', title:'Посадка деревьев', sub:'Оставим след в городе', cat:'волонтёрство', participants:0, chat:[]}
];

let ideas = [];
let joinedIdeas = [];
let userProfile = null;
let currentChatId = null;

// ЗАГРУЗКА ДАННЫХ
function loadData() {
  try {
    // Загружаем пользовательские идеи (добавленные через форму)
    const saved = localStorage.getItem('mayak_user_ideas');
    const userIdeas = saved ? JSON.parse(saved) : [];
    
    // Базовые 14 идей ВСЕГДА есть
    ideas = BASE_IDEAS.concat(userIdeas);
    
    // Загружаем участников
    const savedJoined = localStorage.getItem('mayak_joined');
    joinedIdeas = savedJoined ? JSON.parse(savedJoined) : [];
    
    // Загружаем профиль
    const savedProfile = localStorage.getItem('mayak_profile');
    userProfile = savedProfile ? JSON.parse(savedProfile) : null;
  } catch (e) {
    console.error('Ошибка:', e);
    ideas = BASE_IDEAS.slice();
    joinedIdeas = [];
    userProfile = null;
  }
}

// СОХРАНЕНИЕ ДАННЫХ
function saveData() {
  // Сохраняем только пользовательские идеи (без базовых 14)
  const userIdeas = ideas.filter(i => i.id > 1000);
  localStorage.setItem('mayak_user_ideas', JSON.stringify(userIdeas));
  localStorage.setItem('mayak_joined', JSON.stringify(joinedIdeas));
  
  document.getElementById('totalIdeas').textContent = ideas.length;
  document.getElementById('totalUsers').textContent = joinedIdeas.length;
}

// СБРОС ДАННЫХ
function resetData() {
  if (confirm('Сбросить все данные и загрузить 14 идей заново?')) {
    localStorage.removeItem('mayak_user_ideas');
    localStorage.removeItem('mayak_joined');
    localStorage.removeItem('mayak_profile');
    loadData();
    saveData();
    renderIdeas();
    alert('✅ Готово! 14 идей загружены.');
    location.reload();
  }
}

// ЗНАКИ ЗОДИАКА
const ZODIAC_SIGNS = [
  {name:'Козерог', icon:'♑', start:[1,1], end:[1,19]},
  {name:'Водолей', icon:'♒', start:[1,20], end:[2,18]},
  {name:'Рыбы', icon:'', start:[2,19], end:[3,20]},
  {name:'Овен', icon:'♈', start:[3,21], end:[4,19]},
  {name:'Телец', icon:'♉', start:[4,20], end:[5,20]},
  {name:'Близнецы', icon:'', start:[5,21], end:[6,20]},
  {name:'Рак', icon:'♋', start:[6,21], end:[7,22]},
  {name:'Лев', icon:'♌', start:[7,23], end:[8,22]},
  {name:'Дева', icon:'♍', start:[8,23], end:[9,22]},
  {name:'Весы', icon:'', start:[9,23], end:[10,22]},
  {name:'Скорпион', icon:'♏', start:[10,23], end:[11,21]},
  {name:'Стрелец', icon:'♐', start:[11,22], end:[12,21]},
  {name:'Козерог', icon:'♑', start:[12,22], end:[12,31]}
];

function getZodiacSign(birthdate) {
  if (!birthdate) return null;
  const date = new Date(birthdate);
  const month = date.getMonth() + 1;
  const day = date.getDate();
  for (let sign of ZODIAC_SIGNS) {
    if (month === sign.start[0] && day >= sign.start[1]) return sign;
    if (month === sign.end[0] && day <= sign.end[1]) return sign;
  }
  return null;
}

function updateZodiac() {
  const birthdate = document.getElementById('prof-birthdate').value;
  const sign = getZodiacSign(birthdate);
  const display = document.getElementById('zodiacDisplay');
  if (sign) {
    document.getElementById('zodiacIcon').textContent = sign.icon;
    document.getElementById('zodiacText').textContent = sign.name;
    display.style.display = 'block';
  } else {
    display.style.display = 'none';
  }
}

// ЗАПУСК
window.addEventListener('DOMContentLoaded', () => {
  loadData();
  saveData();
  renderIdeas();
});

// РЕНДЕР ИДЕЙ
function renderIdeas() {
  const grid = document.getElementById('ideasGrid');
  grid.innerHTML = '';
  
  ideas.forEach(idea => {
    const card = document.createElement('div');
    card.className = 'idea-card';
    card.innerHTML = `
      <div class="idea-ico">${idea.emoji}</div>
      <div class="idea-content">
        <div class="idea-text">${idea.title}</div>
        <div class="idea-sub">${idea.sub}</div>
        <div class="idea-participants">👥 ${idea.participants} человек · 💬 ${idea.chat.length > 0 ? 'Чат (' + idea.chat.length + ')' : 'Нет сообщений'}</div>
      </div>
      <div class="chat-indicator">💬</div>
    `;
    card.onclick = () => openChat(idea.id, idea.title);
    grid.appendChild(card);
  });
}

// ОТПРАВКА ИДЕИ
function submitIdea() {
  const title = document.getElementById('idea-title').value.trim();
  const cat = document.getElementById('idea-cat').value;
  const desc = document.getElementById('idea-desc').value.trim();
  
  if (!title) {
    alert('Введите название идеи');
    return;
  }
  
  const emojis = {
    природа: ['', '🍄', '', '🏞️'],
    спорт: ['🏃', '🚴', '', '🏊'],
    творчество: ['🎨', '🎲', '🎤', '📸'],
    еда: ['🍕', '☕', '🍰', '🍽️'],
    культура: ['🏛️', '🎬', '📚', '🎭'],
    активный: ['🎯', '🎮', '🎡', '🎪'],
    волонтёрство: ['🤝', '🌿', '🐕', ''],
    другое: ['✨', '💫', '💖', '🌟']
  };
  
  const emojiList = emojis[cat] || ['✨'];
  const emoji = emojiList[Math.floor(Math.random() * emojiList.length)];
  
  const newIdea = {
    id: Date.now(),
    emoji: emoji,
    title: title,
    sub: desc || 'Описание',
    cat: cat,
    participants: 0,
    chat: []
  };
  
  ideas.unshift(newIdea);
  saveData();
  renderIdeas();
  
  document.getElementById('idea-title').value = '';
  document.getElementById('idea-desc').value = '';
  
  alert('✅ Идея опубликована!');
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// ПРОФИЛЬ
function openProfile() {
  const modal = document.getElementById('profileModal');
  if (userProfile) {
    document.getElementById('prof-name').value = userProfile.name || '';
    document.getElementById('prof-birthdate').value = userProfile.birthdate || '';
    document.getElementById('prof-gender').value = userProfile.gender || 'x';
    document.getElementById('prof-city').value = userProfile.city || 'msk';
    document.getElementById('prof-about').value = userProfile.about || '';
    if (userProfile.photo) document.getElementById('profilePhotoPreview').src = userProfile.photo;
    updateZodiac();
  }
  modal.classList.add('open');
}

function closeProfile() {
  document.getElementById('profileModal').classList.remove('open');
}

function handlePhotoUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) {
    alert('Макс. 2 МБ');
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('profilePhotoPreview').src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function saveProfile() {
  const birthdate = document.getElementById('prof-birthdate').value;
  const sign = getZodiacSign(birthdate);
  
  userProfile = {
    name: document.getElementById('prof-name').value.trim() || 'Аноним',
    birthdate: birthdate,
    zodiac: sign ? {name: sign.name, icon: sign.icon} : null,
    gender: document.getElementById('prof-gender').value,
    city: document.getElementById('prof-city').value,
    about: document.getElementById('prof-about').value.trim(),
    photo: document.getElementById('profilePhotoPreview').src
  };
  
  localStorage.setItem('mayak_profile', JSON.stringify(userProfile));
  closeProfile();
  alert('✅ Профиль сохранён!');
  
  if (!joinedIdeas.includes(userProfile.name)) {
    joinedIdeas.push(userProfile.name);
    saveData();
  }
}

// ЧАТ
function openChat(id, title) {
  if (!userProfile || !userProfile.name) {
    alert('Сначала заполните профиль');
    openProfile();
    return;
  }
  
  currentChatId = id;
  const idea = ideas.find(x => x.id === id);
  
  document.getElementById('chat-title').textContent = title;
  document.getElementById('chat-sub').textContent = '💬 ' + idea.participants + ' участников · ' + idea.chat.length + ' сообщений';
  
  renderChat(id);
  document.getElementById('chatModal').classList.add('open');
  
  setTimeout(() => {
    document.getElementById('chat-messages').scrollTop = 99999;
  }, 50);
}

function renderChat(id) {
  const messagesDiv = document.getElementById('chat-messages');
  const idea = ideas.find(x => x.id === id);
  const data = idea ? idea.chat : [];
  
  if (data.length === 0) {
    messagesDiv.innerHTML = '<div style="color:var(--muted);text-align:center;padding:3rem;font-size:15px">💬 Пока нет сообщений<br><br>Будьте первым — напишите приветствие!</div>';
    return;
  }
  
  messagesDiv.innerHTML = data.map(msg => {
    const isMe = msg.name === (userProfile ? userProfile.name : '');
    return `<div class="msg ${isMe ? 'me' : ''}">
      <div class="msg-av">${msg.name ? msg.name.charAt(0).toUpperCase() : '?'}</div>
      <div>
        <div class="msg-name">${msg.name}${msg.zodiac ? ', ' + msg.zodiac.icon + ' ' + msg.zodiac.name : ''}</div>
        <div class="msg-bubble">${msg.text}</div>
      </div>
    </div>`;
  }).join('');
}

function sendMsg() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  
  if (!text) return;
  
  const idea = ideas.find(x => x.id === currentChatId);
  if (!idea.chat) idea.chat = [];
  
  idea.chat.push({
    name: userProfile.name,
    gender: userProfile.gender || 'x',
    text: text,
    photo: userProfile.photo || '',
    zodiac: userProfile.zodiac || null
  });
  
  saveData();
  renderChat(currentChatId);
  input.value = '';
  
  setTimeout(() => {
    document.getElementById('chat-messages').scrollTop = 99999;
  }, 50);
}

function closeChat() {
  document.getElementById('chatModal').classList.remove('open');
}

document.getElementById('chatModal').addEventListener('click', function(e) {
  if (e.target === this) closeChat();
});
</script>
