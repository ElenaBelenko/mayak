<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Маяк Любви — сайт знакомств вживую</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --rose: #D4A0B0;
  --rose-dark: #BE8A9A;
  --rose-darker: #A87484;
  --rose-light: #EED0D8;
  --rose-lighter: #F8E8EC;
  --rose-bright: #E0B0BE;
  --accent: #9A7B85;
  --bg: #fdf8f6;
  --card: #ffffff;
  --border: #ecdde2;
  --text: #3a2a30;
  --muted: #8a6e76;
  --radius: 16px;
  --shadow: 0 4px 24px rgba(212,160,176,.2);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Raleway',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.65;font-weight:400}

header{background:linear-gradient(135deg,var(--rose-lighter) 0%,var(--rose-light) 100%);padding:1.5rem 1.5rem 1rem}
.header-inner{max-width:900px;margin:0 auto;text-align:center}
.logo-svg{max-width:320px;width:100%;height:auto;margin:0 auto;display:block}
.stats-bar{background:rgba(212,160,176,.15);backdrop-filter:blur(4px);color:var(--text);font-size:13px;font-weight:600;padding:10px 1.5rem;text-align:center;letter-spacing:.03em;border-radius:20px;margin-top:1rem;display:flex;justify-content:center;gap:2rem;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.stats-bar strong{color:var(--rose-dark)}

.city-bar{background:var(--card);border-bottom:1px solid var(--border);padding:1rem 1.5rem}
.city-bar-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap}
.city-label{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.city-select{padding:8px 16px;border:2px solid var(--border);border-radius:20px;font-family:'Raleway',sans-serif;font-size:14px;font-weight:600;color:var(--text);background:var(--bg);cursor:pointer;outline:none;transition:border .15s}
.city-select:focus{border-color:var(--rose)}
.online-dot{width:8px;height:8px;border-radius:50%;background:#4caf50;display:inline-block;margin-right:4px;box-shadow:0 0 0 2px rgba(76,175,80,.25)}
.city-online{font-size:13px;color:var(--muted)}

.page{max-width:900px;margin:0 auto;padding:2.5rem 1.5rem}

.section-title{font-family:'Playfair Display',serif;font-size:34px;font-weight:700;margin-bottom:.5rem;color:var(--text);text-align:center}
.section-subtitle{font-size:16px;color:var(--muted);text-align:center;margin-bottom:2.5rem;font-style:italic}

.ideas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;margin-bottom:3rem}
.idea-card{
  background:var(--card);
  border:2px solid var(--border);
  border-radius:var(--radius);
  padding:1.5rem;
  display:flex;
  align-items:flex-start;
  gap:1rem;
  transition:all .25s;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}
.idea-card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:linear-gradient(135deg,var(--rose-lighter) 0%,transparent 100%);
  opacity:0;
  transition:opacity .25s;
  pointer-events:none;
}
.idea-card:hover{
  border-color:var(--rose);
  box-shadow:var(--shadow);
  transform:translateY(-4px) scale(1.02);
}
.idea-card:hover::before{opacity:.5}
.idea-ico{font-size:36px;line-height:1;flex-shrink:0;z-index:1}
.idea-content{flex:1;z-index:1}
.idea-text{font-size:16px;font-weight:700;color:var(--text);margin-bottom:.35rem}
.idea-sub{font-size:14px;color:var(--muted);margin-bottom:.5rem}
.idea-participants{font-size:12px;color:var(--rose-dark);font-weight:600;display:flex;align-items:center;gap:.5rem}
.chat-indicator{
  position:absolute;
  top:1rem;right:1rem;
  background:var(--rose-light);
  width:36px;height:36px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  transition:all .2s;
  z-index:2;
}
.idea-card:hover .chat-indicator{
  background:var(--rose);
  transform:scale(1.1) rotate(10deg);
}
.click-hint{
  position:absolute;
  bottom:1rem;right:1rem;
  font-size:11px;
  color:var(--rose-dark);
  opacity:0;
  transition:opacity .2s;
  font-weight:600;
  z-index:2;
}
.idea-card:hover .click-hint{opacity:.8}

.suggest-card{background:var(--card);border:2px dashed var(--rose-light);border-radius:var(--radius);padding:2.5rem;margin-bottom:2rem;box-shadow:0 2px 12px rgba(212,160,176,.1)}
.suggest-card h3{font-family:'Playfair Display',serif;font-size:28px;font-weight:600;color:var(--rose-dark);margin-bottom:1.5rem;text-align:center;font-style:italic}
.form-row{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1rem}
.form-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:200px}
.form-group label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.form-group input,.form-group textarea,.form-group select{padding:12px 14px;border:2px solid var(--border);border-radius:12px;font-family:'Raleway',sans-serif;font-size:14px;color:var(--text);background:var(--bg);outline:none;transition:border .15s}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--rose)}
.form-group textarea{resize:vertical;min-height:100px}
.submit-btn{width:100%;padding:14px;background:var(--rose);color:#fff;border:none;border-radius:12px;font-family:'Raleway',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s;margin-top:.5rem}
.submit-btn:hover{background:var(--rose-dark);transform:translateY(-2px)}

.profile-btn{
  position:fixed;
  bottom:2rem;right:2rem;
  width:64px;height:64px;
  background:var(--rose);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:30px;
  box-shadow:0 4px 20px rgba(212,160,176,.5);
  cursor:pointer;
  transition:all .25s;
  z-index:100;
  border:none;
}
.profile-btn:hover{
  background:var(--rose-dark);
  transform:scale(1.15) rotate(5deg);
}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:24px;max-width:500px;width:100%;padding:2.5rem;position:relative;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-close{position:absolute;top:1.25rem;right:1.25rem;background:var(--rose-lighter);border:none;border-radius:50%;width:40px;height:40px;font-size:22px;cursor:pointer;color:var(--rose-dark);font-weight:800;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:var(--rose);color:#fff;transform:rotate(90deg)}
.modal h2{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;margin-bottom:.75rem;text-align:center;color:var(--text)}
.modal-sub{font-size:14px;color:var(--muted);margin-bottom:2rem;text-align:center}
.auth-form{display:flex;flex-direction:column;gap:1.25rem}

.profile-header{text-align:center;margin-bottom:2rem}
.profile-photo-wrap{position:relative;width:130px;height:130px;margin:0 auto 1.5rem}
.profile-photo{width:130px;height:130px;border-radius:50%;object-fit:cover;border:4px solid var(--rose-light);background:var(--rose-bright)}
.photo-upload-label{position:absolute;bottom:0;right:0;background:var(--rose);color:#fff;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;border:3px solid #fff;transition:all .2s}
.photo-upload-label:hover{background:var(--rose-dark);transform:scale(1.1)}
.photo-upload-input{display:none}

.chat-messages{height:350px;overflow-y:auto;padding:1.25rem;background:var(--bg);border-radius:16px;border:2px solid var(--border);display:flex;flex-direction:column;gap:1rem;margin-bottom:1.25rem}
.chat-messages::-webkit-scrollbar{width:6px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--rose-light);border-radius:3px}
.msg{display:flex;gap:1rem;align-items:flex-start;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.me{flex-direction:row-reverse}
.msg-av{width:40px;height:40px;border-radius:50%;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;background-size:cover;background-position:center;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.msg-bubble{background:#fff;border:2px solid var(--border);border-radius:18px;padding:.75rem 1.25rem;font-size:14px;line-height:1.5;max-width:75%;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.msg.me .msg-bubble{background:var(--rose);color:#fff;border-color:var(--rose)}
.msg-name{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:.35rem}
.msg.me .msg-name{text-align:right;color:rgba(255,255,255,.85)}
.chat-input-row{display:flex;gap:1rem}
.chat-input{flex:1;padding:14px 18px;border:2px solid var(--border);border-radius:14px;font-family:'Raleway',sans-serif;font-size:14px;outline:none;background:var(--bg);transition:border .15s}
.chat-input:focus{border-color:var(--rose)}
.chat-send{padding:14px 28px;background:var(--rose);color:#fff;border:none;border-radius:14px;font-family:'Raleway',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.chat-send:hover{background:var(--rose-dark);transform:translateY(-2px)}

.toast{position:fixed;bottom:2rem;right:2rem;background:var(--text);color:#fff;padding:1rem 1.75rem;border-radius:14px;font-size:14px;font-weight:700;z-index:2000;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:#4caf50}
.toast.info{background:var(--rose)}

@media(max-width:600px){
  .logo-svg{max-width:240px}
  .section-title{font-size:26px}
  .ideas-grid{grid-template-columns:1fr;gap:1rem}
  .form-row{flex-direction:column}
  .profile-btn{bottom:1.5rem;right:1.5rem;width:56px;height:56px;font-size:26px}
  .modal{padding:2rem 1.5rem}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <svg class="logo-svg" viewBox="0 0 400 380" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="heartGrad" cx="50%" cy="40%" r="50%">
          <stop offset="0%" stop-color="#FFD0D8" stop-opacity="0.9"/>
          <stop offset="50%" stop-color="#FF8FA8" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#FF6B8A" stop-opacity="0.4"/>
        </radialGradient>
        <linearGradient id="lighthouseRed" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#C41E3A"/>
          <stop offset="50%" stop-color="#DC143C"/>
          <stop offset="100%" stop-color="#A01025"/>
        </linearGradient>
        <radialGradient id="lanternGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#FFF8DC" stop-opacity="1"/>

        <linearGradient id="beamGrad" x1="0" y1="0" x2="1" y2="0">

        </linearGradient>
        <linearGradient id="beamGrad2" x1="1" y1="0" x2="0" y2="0">
          <stop offset="0%" stop-color="#FFD700" stop-opacity="0.6"/>

        </linearGradient>
        <linearGradient id="waveGrad1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#2A5298"/>

        </linearGradient>
        <linearGradient id="waveGrad2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#3A6BC5"/>

        </linearGradient>
      </defs>

      <path d="M200,340 C80,260 30,200 60,130 C80,85 120,70 160,100 C180,115 195,130 200,140 C205,130 220,115 240,100 C280,70 320,85 340,130 C370,200 320,260 200,340Z" fill="url(#heartGrad)"/>

      <polygon points="200,155 60,100 60,140" fill="url(#beamGrad2)" opacity="0.5">
        <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="200,155 340,100 340,140" fill="url(#beamGrad)" opacity="0.5">
        <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
      </polygon>

      <path d="M30,310 Q70,290 110,305 Q150,320 190,305 Q230,290 270,305 Q310,320 350,305 Q370,298 380,310 L380,340 Q340,330 300,335 Q260,340 220,335 Q180,330 140,335 Q100,340 60,335 Q40,332 30,330 Z" fill="url(#waveGrad1)" opacity="0.9"/>
      <path d="M20,320 Q60,300 100,315 Q140,330 180,315 Q220,300 260,315 Q300,330 340,315 Q370,305 390,320 L390,350 Q350,340 310,345 Q270,350 230,345 Q190,340 150,345 Q110,350 70,345 Q40,342 20,340 Z" fill="url(#waveGrad2)" opacity="0.95"/>
      <path d="M50,315 Q55,308 65,312 Q70,308 75,315" fill="white" opacity="0.7"/>
      <path d="M330,310 Q335,303 345,307 Q350,303 355,310" fill="white" opacity="0.7"/>

      <path d="M170,310 L175,240 L225,240 L230,310 Z" fill="url(#lighthouseRed)"/>
      <path d="M173,275 L176,240 L224,240 L227,275 Z" fill="#F5F5F5"/>
      <path d="M176,240 L180,200 L220,200 L224,240 Z" fill="url(#lighthouseRed)"/>
      
      <path d="M192,300 L192,280 A8,8 0 0,1 208,280 L208,300 Z" fill="#8B0000"/>
      <path d="M200,285 C197,282 196,281 198,280 C199,279 200,280 200,282 C200,280 201,279 202,280 C204,281 203,282 200,285Z" fill="#FF6B8A"/>
      
      <rect x="194" y="252" width="12" height="14" fill="#FFE4E1" stroke="#8B0000" stroke-width="1.5" rx="2"/>
      <line x1="200" y1="252" x2="200" y2="266" stroke="#8B0000" stroke-width="1"/>
      <line x1="194" y1="259" x2="206" y2="259" stroke="#8B0000" stroke-width="1"/>
      
      <path d="M200,228 C193,222 191,220 194,218 C196,216 198,217 200,220 C202,217 204,216 206,218 C209,220 207,222 200,228Z" fill="#DC143C"/>
      
      <rect x="172" y="195" width="56" height="8" fill="#8B0000" rx="2"/>

      <line x1="180" y1="190" x2="180" y2="196" stroke="#8B0000" stroke-width="1"/>
      <line x1="190" y1="190" x2="190" y2="196" stroke="#8B0000" stroke-width="1"/>
      <line x1="200" y1="190" x2="200" y2="196" stroke="#8B0000" stroke-width="1"/>
      <line x1="210" y1="190" x2="210" y2="196" stroke="#8B0000" stroke-width="1"/>
      <line x1="220" y1="190" x2="220" y2="196" stroke="#8B0000" stroke-width="1"/>
      
      <rect x="183" y="170" width="34" height="22" fill="#FFF8DC" stroke="#8B0000" stroke-width="2" rx="2"/>
      <line x1="191" y1="170" x2="191" y2="192" stroke="#8B0000" stroke-width="1.5"/>
      <line x1="200" y1="170" x2="200" y2="192" stroke="#8B0000" stroke-width="1.5"/>
      <line x1="209" y1="170" x2="209" y2="192" stroke="#8B0000" stroke-width="1.5"/>
      
      <circle cx="200" cy="181" r="12" fill="url(#lanternGlow)">
        <animate attributeName="r" values="10;14;10" dur="2s" repeatCount="indefinite"/>

      <path d="M180,170 L200,155 L220,170 Z" fill="#DC143C"/>

      <text x="200" y="370" font-family="Playfair Display, serif" font-size="38" font-weight="700" fill="#C41E3A" text-anchor="middle" font-style="italic" letter-spacing="1">Маяк Любви</text>

    <div class="stats-bar">
      <span>🧔 Мужчин онлайн: <strong>450</strong></span>
      <span>👩 Женщин онлайн: <strong>520</strong></span>
      <span> Всего идей: <strong id="totalIdeas">14</strong></span>
    </div>
  </div>
</header>

<div class="city-bar">
  <div class="city-bar-inner">
    <span class="city-label">📍 Ваш город:</span>
    <select class="city-select" id="citySelect" onchange="updateCity()">
      <option value="msk">Москва</option><option value="spb">Санкт-Петербург</option>
      <option value="nsk">Новосибирск</option><option value="ekb">Екатеринбург</option>
      <option value="kzn">Казань</option><option value="nnov">Нижний Новгород</option>
      <option value="chel">Челябинск</option><option value="krd">Краснодар</option>
      <option value="omsk">Омск</option><option value="rnd">Ростов-на-Дону</option>
    </select>
    <span class="city-online"><span class="online-dot"></span><span id="cityOnline">970 человек в Москве</span></span>
  </div>
</div>

<div class="page">
  <h1 class="section-title">Идеи для встреч</h1>
  <p class="section-subtitle">Нажмите на карточку, чтобы открыть чат и обсудить встречу 💬</p>
  
  <div class="ideas-grid" id="ideasGrid"></div>

  <div class="suggest-card">
    <h3>➕ Предложить свою идею</h3>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label>Название идеи</label>
        <input type="text" id="idea-title" placeholder="Например: Поход за грибами и пикник">
      </div>
      <div class="form-group">
        <label>Категория</label>
        <select id="idea-cat">
          <option value="природа">Природа</option>
          <option value="спорт">Спорт</option>
          <option value="творчество">Творчество</option>
          <option value="еда">Еда/кафе</option>
          <option value="культура">Культура</option>
          <option value="активный">Активный отдых</option>
          <option value="волонтёрство">Волонтёрство</option>
          <option value="другое">Другое</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Описание</label>
        <textarea id="idea-desc" placeholder="Расскажите подробнее..."></textarea>
      </div>
    </div>
    <button class="submit-btn" onclick="submitIdea()">Опубликовать идею</button>
  </div>
</div>

<button class="profile-btn" onclick="openProfile()" title="Мой профиль">👤</button>

<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <button class="modal-close" onclick="closeProfile()">✕</button>
    <h2>Мой профиль</h2>
    <p class="modal-sub">Заполните анкету, чтобы другие могли узнать вас лучше</p>
    <div class="profile-header">
      <div class="profile-photo-wrap">
        <img id="profilePhotoPreview" class="profile-photo" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23E0B0BE'/%3E%3Ctext x='50' y='60' font-size='40' text-anchor='middle' fill='%23fff'%3E👤%3C/text%3E%3C/svg%3E" alt="Фото">
        <label class="photo-upload-label" for="photoUpload">📷</label>
        <input type="file" id="photoUpload" class="photo-upload-input" accept="image/*" onchange="handlePhotoUpload(event)">
      </div>
    </div>
    <div class="auth-form">
      <div class="form-row">
        <div class="form-group"><label>Имя</label><input type="text" id="prof-name" placeholder="Ваше имя"></div>
        <div class="form-group"><label>Возраст</label><input type="number" id="prof-age" placeholder="25" min="18" max="99"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Пол</label><select id="prof-gender"><option value="f">Женщина</option><option value="m">Мужчина</option><option value="x">Не указывать</option></select></div>
        <div class="form-group"><label>Город</label><select id="prof-city"><option value="msk">Москва</option><option value="spb">Санкт-Петербург</option><option value="nsk">Новосибирск</option><option value="ekb">Екатеринбург</option><option value="kzn">Казань</option><option value="rnd">Ростов-на-Дону</option></select></div>
      </div>
      <div class="form-group"><label>О себе</label><textarea id="prof-about" placeholder="Расскажите о себе..." style="min-height:80px"></textarea></div>
      <button class="submit-btn" onclick="saveProfile()">💾 Сохранить профиль</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="chatModal">
  <div class="modal" style="max-width:520px">
    <button class="modal-close" onclick="closeChat()">✕</button>
    <h2 id="chat-title"></h2>
    <p class="modal-sub" id="chat-sub"></p>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" placeholder="Напишите сообщение..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="chat-send" onclick="sendMsg()">Отправить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'lh_ideas_v4';
const STORAGE_KEY_JOINED = 'lh_joined_v4';
const STORAGE_KEY_PROFILE = 'lh_profile_v4';

let userProfile = JSON.parse(localStorage.getItem(STORAGE_KEY_PROFILE)) || null;

// 14 ИДЕЙ - ТИХАЯ ОХОТА УБРАНА
let ideas = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
  {id:1, emoji:'🎣', title:'Рыбалка на рассвете', sub:'Тишина и чай у воды', cat:'природа', participants:8, chat:[{name:'Андрей К.',text:'Встречаемся в 5:30 на берегу',g:'m',age:38},{name:'Елена Т.',text:'Я первый раз, но очень хочу!',g:'f',age:29}]},
  {id:2, emoji:'', title:'Велопрогулка', sub:'По набережной 10 км', cat:'спорт', participants:16, chat:[{name:'Максим Л.',text:'Маршрут простой, без горок',g:'m',age:27},{name:'Юлия Н.',text:'Отлично! Я новичок',g:'f',age:24}]},
  {id:3, emoji:'️', title:'Экскурсия по храмам', sub:'Загородная поездка', cat:'культура', participants:20, chat:[{name:'Ольга С.',text:'Посетим 3 старинных храма',g:'f',age:45},{name:'Сергей В.',text:'Возьму фотоаппарат 📷',g:'m',age:50}]},
  {id:4, emoji:'🍳', title:'Кулинарный мастер-класс', sub:'Готовим итальянскую пасту', cat:'творчество', participants:12, chat:[{name:'Мария Д.',text:'Готовим пасту и тирамису!',g:'f',age:30},{name:'Павел Г.',text:'Обожаю итальянскую кухню',g:'m',age:33}]},
  {id:5, emoji:'🌿', title:'Эко-субботник', sub:'Уборка парка + чай', cat:'волонтёрство', participants:12, chat:[{name:'Олег П.',text:'Инвентарь выдадим',g:'m',age:31},{name:'Марина С.',text:'Я возьму печенье 🍪',g:'f',age:26}]},
  {id:6, emoji:'🐕', title:'Помощь приюту', sub:'Выгул собак', cat:'волонтёрство', participants:9, chat:[{name:'Дарья В.',text:'Нужны корма и поводки',g:'f',age:24}]},
  {id:7, emoji:'📸', title:'Фотопрогулка', sub:'Красивые кадры города', cat:'творчество', participants:11, chat:[]},
  {id:8, emoji:'🎳', title:'Боулинг', sub:'Весело в компании', cat:'спорт', participants:13, chat:[]},
  {id:9, emoji:'🎲', title:'Настольные игры', sub:'В уютном антикафе', cat:'творчество', participants:16, chat:[]},
  {id:10, emoji:'☕', title:'Вечерние посиделки', sub:'Уютное кафе, живая музыка', cat:'еда', participants:10, chat:[]},
  {id:11, emoji:'🎤', title:'Караоке', sub:'Пой и знакомься', cat:'творчество', participants:12, chat:[]},
  {id:12, emoji:'🍕', title:'Пицца-пати', sub:'Готовим и едим вместе', cat:'еда', participants:15, chat:[]},
  {id:13, emoji:'', title:'Бассейн', sub:'Плаваем и общаемся', cat:'спорт', participants:8, chat:[]},
  {id:14, emoji:'🌲', title:'Посадка деревьев', sub:'Оставим след в городе', cat:'волонтёрство', participants:18, chat:[]}
];

let joinedIdeas = JSON.parse(localStorage.getItem(STORAGE_KEY_JOINED)) || [];
let currentChatId = null;

function saveData(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(ideas));
  localStorage.setItem(STORAGE_KEY_JOINED, JSON.stringify(joinedIdeas));
  document.getElementById('totalIdeas').textContent = ideas.length;
}

window.addEventListener('DOMContentLoaded', () => {
  if (!userProfile) { 
    setTimeout(() => { 
      showToast('👋 Добро пожаловать! Заполните профиль', 'info'); 
      openProfile(); 
    }, 500); 
  }
  saveData(); 
  renderIdeas();
});

const COLORS = ['#D4A0B0','#BE8A9A','#E0B0BE','#A87484','#9A7B85','#C9909F','#B8808F','#D098A8'];
function getColor(n){let h=0;for(const c of n)h=(h*31+c.charCodeAt(0))%COLORS.length;return COLORS[h]}
function initials(n){return n.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase()}
function showToast(m,t='info'){const e=document.getElementById('toast');e.textContent=m;e.className=`toast ${t}`;setTimeout(()=>e.classList.add('show'),10);setTimeout(()=>e.classList.remove('show'),3000)}

function renderIdeas(){
  const g=document.getElementById('ideasGrid');
  g.innerHTML='';
  ideas.forEach(i=>{
    const card=document.createElement('div');
    card.className='idea-card';
    card.innerHTML=`
      <div class="idea-ico">${i.emoji}</div>
      <div class="idea-content">
        <div class="idea-text">${i.title}</div>
        <div class="idea-sub">${i.sub}</div>
        <div class="idea-participants"> ${i.participants} человек · 💬 ${i.chat.length>0?`Чат (${i.chat.length})`:'Нет сообщений'}</div>
      </div>
      <div class="chat-indicator">💬</div>
      <div class="click-hint">Нажмите для чата →</div>
    `;
    card.onclick=()=>openChat(i.id,i.title);
    g.appendChild(card);
  });
}

const CITY_DATA={msk:{name:'Москве',count:970},spb:{name:'Санкт-Петербурге',count:640},nsk:{name:'Новосибирске',count:210},ekb:{name:'Екатеринбурге',count:280},kzn:{name:'Казани',count:190},nnov:{name:'Нижнем Новгороде',count:150},chel:{name:'Челябинске',count:130},krd:{name:'Краснодаре',count:175},omsk:{name:'Омске',count:110},rnd:{name:'Ростове-на-Дону',count:160}};
function updateCity(){const v=document.getElementById('citySelect').value;const d=CITY_DATA[v];document.getElementById('cityOnline').textContent=`${d.count} человек в ${d.name}`}

function submitIdea(){
  const t=document.getElementById('idea-title').value.trim();
  const c=document.getElementById('idea-cat').value;
  const desc=document.getElementById('idea-desc').value.trim();
  if(!t){showToast('Введите название идеи','info');return}
  const emojis={природа:['🌲','🍄','🌸','🏞️'],спорт:['🏃','🚴','','🏊'],творчество:['','🎲','🎤',''],еда:['🍕','☕','🍰','🍽️'],культура:['🏛️','🎬','📚','🎭'],активный:['🎯','🎮','🎡','🎪'],волонтёрство:['🤝','🌿','🐕','🌳'],другое:['✨','💫','💖','']};
  const emoji=emojis[c][Math.floor(Math.random()*4)];
  ideas.unshift({id:Date.now(),emoji,title:t,sub:desc||'Описание',cat,participants:1,chat:[]});
  saveData();renderIdeas();
  document.getElementById('idea-title').value='';document.getElementById('idea-desc').value='';
  showToast('✅ Идея опубликована!','success');
  window.scrollTo({top:0,behavior:'smooth'});
}

function openProfile(){
  const m=document.getElementById('profileModal');
  if(userProfile){
    document.getElementById('prof-name').value=userProfile.name||'';
    document.getElementById('prof-age').value=userProfile.age||'';
    document.getElementById('prof-gender').value=userProfile.gender||'x';
    document.getElementById('prof-city').value=userProfile.city||'msk';
    document.getElementById('prof-about').value=userProfile.about||'';
    if(userProfile.photo)document.getElementById('profilePhotoPreview').src=userProfile.photo;
  }
  m.classList.add('open');
}
function closeProfile(){document.getElementById('profileModal').classList.remove('open')}
function handlePhotoUpload(e){
  const f=e.target.files[0];if(!f)return;
  if(f.size>2*1024*1024){showToast('Макс. 2 МБ','info');return}
  const r=new FileReader();r.onload=e=>document.getElementById('profilePhotoPreview').src=e.target.result;r.readAsDataURL(f);
}
function saveProfile(){
  userProfile={name:document.getElementById('prof-name').value.trim()||'Аноним',age:document.getElementById('prof-age').value,gender:document.getElementById('prof-gender').value,city:document.getElementById('prof-city').value,about:document.getElementById('prof-about').value.trim(),photo:document.getElementById('profilePhotoPreview').src};
  localStorage.setItem(STORAGE_KEY_PROFILE,JSON.stringify(userProfile));
  closeProfile();showToast('✅ Профиль сохранён!','success');
}

function openChat(id,title){
  if(!userProfile?.name){showToast('Сначала заполните профиль','info');openProfile();return}
  currentChatId=id;
  const idea=ideas.find(x=>x.id===id);
  document.getElementById('chat-title').textContent=title;
  document.getElementById('chat-sub').textContent=`💬 ${idea.participants} участников · ${idea.chat.length} сообщений`;
  renderChat(id);
  document.getElementById('chatModal').classList.add('open');
  setTimeout(()=>{document.getElementById('chat-messages').scrollTop=99999},50);
}
function renderChat(id){
  const m=document.getElementById('chat-messages');
  const data=ideas.find(x=>x.id===id)?.chat||[];
  if(data.length===0){m.innerHTML='<div style="color:var(--muted);text-align:center;padding:3rem;font-size:15px">💬 Пока нет сообщений<br><br>Будьте первым — напишите приветствие!</div>';return}
  m.innerHTML=data.map(x=>{
    const i=x.name===userProfile?.name;
    return `<div class="msg ${i?'me':''}">${x.photo?`<div class="msg-av" style="background-image:url('${x.photo}')"></div>`:`<div class="msg-av" style="background:${getColor(x.name)}">${initials(x.name)}</div>`}<div><div class="msg-name">${x.name}${x.age?', '+x.age:''}</div><div class="msg-bubble">${x.text}</div></div></div>`;
  }).join('');
}
function sendMsg(){
  const i=document.getElementById('chat-input');const t=i.value.trim();
  if(!t)return;
  const idea=ideas.find(x=>x.id===currentChatId);
  if(!idea.chat)idea.chat=[];
  idea.chat.push({name:userProfile.name,g:userProfile?.gender||'x',text:t,photo:userProfile?.photo||'',age:userProfile?.age||''});
  saveData();renderChat(currentChatId);i.value='';document.getElementById('chat-messages').scrollTop=99999;
}
function closeChat(){document.getElementById('chatModal').classList.remove('open')}
document.getElementById('chatModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeChat()});
</script>
</body>
</html>
